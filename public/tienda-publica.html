<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#be185d">
<title>Tienda Pro — Catálogo</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f5f2;--surface:#fff;--surface2:#f3f0ec;--border:rgba(0,0,0,.09);--divider:rgba(0,0,0,.06);--text:#1c1917;--muted:#78716c;--faint:#c2bfbb;--primary:#be185d;--primary-h:#9d174d;--primary-hi:#fce7f3;--success:#16a34a;--r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-full:9999px;--sh-sm:0 1px 3px rgba(0,0,0,.08);--font:'Satoshi',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:80px}
input,select,button{font:inherit;color:inherit;border:none;outline:none;background:none}
img{display:block;max-width:100%;height:auto}
.hdr{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--divider);padding:.875rem 1rem;display:flex;align-items:center;gap:.75rem;box-shadow:var(--sh-sm)}
.hdr-title{flex:1;font-size:1.125rem;font-weight:700}
.search-wrap{position:relative;flex:1}
.search-wrap svg{position:absolute;left:.875rem;top:50%;transform:translateY(-50%);color:var(--muted);width:18px;height:18px}
.search-wrap input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-full);padding:.65rem 1rem .65rem 2.75rem;width:100%;font-size:.95rem}
.search-wrap input:focus{border-color:var(--primary)}
.content{padding:1rem;display:flex;flex-direction:column;gap:1rem}
.filter-row{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.25rem}
.filter-chip{white-space:nowrap;padding:.45rem .9rem;border-radius:var(--r-full);background:var(--surface2);border:1.5px solid var(--border);font-size:.85rem;font-weight:500;cursor:pointer;transition:all .15s}
.filter-chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.875rem}
@media(min-width:640px){.prod-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.prod-grid{grid-template-columns:repeat(4,1fr)}}
.t-card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden;display:flex;flex-direction:column}
.t-img{aspect-ratio:1/1;background:var(--surface2);position:relative}
.t-img img{width:100%;height:100%;object-fit:cover}
.t-badge{position:absolute;top:.5rem;left:.5rem;background:var(--primary);color:#fff;font-size:.65rem;font-weight:600;padding:.2rem .5rem;border-radius:var(--r-full);text-transform:uppercase}
.t-body{padding:.875rem;display:flex;flex-direction:column;gap:.375rem;flex:1}
.t-name{font-weight:600;font-size:.95rem;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.t-meta{font-size:.78rem;color:var(--muted)}
.t-price{font-size:1.1rem;font-weight:700;color:var(--primary)}
.t-actions{display:flex;gap:.5rem;margin-top:.5rem}
.t-btn{flex:1;padding:.6rem .5rem;border-radius:var(--r-md);font-weight:600;font-size:.8rem;text-align:center;cursor:pointer}
.t-btn-primary{background:var(--primary);color:#fff}
.t-btn-ghost{background:var(--surface2);color:var(--text)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty svg{width:48px;height:48px;stroke:var(--faint);margin-bottom:.75rem}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);border-top:1px solid var(--divider);display:flex;align-items:center;justify-content:center;gap:.75rem;padding:0 1rem;z-index:50}
.bottom-bar a{color:var(--muted);font-size:.75rem;font-weight:500;text-decoration:none;display:flex;align-items:center;gap:.25rem}
/* Modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal.open{display:flex}
.modal-body{background:var(--surface);border-radius:1.25rem 1.25rem 0 0;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;padding:1.5rem}
.modal-close{position:absolute;top:1rem;right:1rem;width:36px;height:36px;border-radius:var(--r-full);background:rgba(0,0,0,.5);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem}
</style>
</head>
<body>
<header class="hdr">
  <span class="hdr-title">🛍️ Tienda Pro</span>
  <div class="search-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="search" id="search" placeholder="Buscar productos…" oninput="render()">
  </div>
</header>
<div class="content">
  <div class="filter-row" id="filters"><button class="filter-chip active" onclick="setCat('')">Todo</button></div>
  <div class="prod-grid" id="grid"></div>
</div>
<div class="bottom-bar">
  <span style="flex:1"></span>
  <a href="/panel-admin.html">🔐 Admin</a>
  <a href="/portal-revendedores.html">👥 Soy revendedor</a>
</div>

<!-- Modal producto -->
<div class="modal" id="modal" onclick="if(event.target.id==='modal')closeModal()">
  <div class="modal-body" style="position:relative">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script>
const API='';
let productos=[],categorias=[],whatsapp='',selCat='';

async function init(){
  const r=await fetch(API+'/api/productos?publicado=1');
  productos=await r.json();
  const w=await fetch(API+'/api/config/whatsapp');
  const wj=await w.json();
  whatsapp=wj.value||'';
  categorias=[...new Set(productos.map(p=>p.categoria).filter(Boolean))];
  const f=$('filters');
  categorias.forEach(c=>f.innerHTML+=`<button class="filter-chip" onclick="setCat('${c}')">${c}</button>`);
  render();
}
function setCat(c){selCat=c;document.querySelectorAll('.filter-chip').forEach(b=>b.classList.toggle('active',b.textContent===(c||'Todo')));render()}
function fmt(n){return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}
function render(){
  const q=$('search').value.toLowerCase();
  const grid=$('grid');
  const filtro=productos.filter(p=>{
    if(selCat && p.categoria!==selCat)return false;
    if(q && !(p.nombre||'').toLowerCase().includes(q))return false;
    return true;
  });
  if(!filtro.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1"><div>Sin productos disponibles</div></div>';return}
  grid.innerHTML=filtro.map(p=>`
    <div class="t-card" onclick="openModal(${p.id})">
      <div class="t-img">${p.imagenes?.[0]?`<img src="${p.imagenes[0]}" loading="lazy">`:'<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--faint);font-size:2rem">📦</div>'}${p.stock<=0?'<span class="t-badge" style="background:var(--danger)">Agotado</span>':''}</div>
      <div class="t-body">
        <div class="t-name">${p.nombre}</div>
        <div class="t-meta">${p.categoria||''} · ${p.talla||''} · ${p.color||''}</div>
        <div class="t-price">${fmt(p.precio)}</div>
        <div class="t-actions">
          <a class="t-btn t-btn-primary" ${p.stock>0?`href="https://wa.me/${whatsapp}?text=${encodeURIComponent('Hola, me interesa: '+p.nombre+' ('+(p.talla||'')+' '+(p.color||'')+') - '+fmt(p.precio))}" target="_blank"`:'style="opacity:.5;pointer-events:none"'}>💬 WhatsApp</a>
          <button class="t-btn t-btn-ghost" onclick="event.stopPropagation();openModal(${p.id})">Ver</button>
        </div>
      </div>
    </div>`).join('');
}
function openModal(id){
  const p=productos.find(x=>x.id===id);if(!p)return;
  const imgs=(p.imagenes||[]).map((src,i)=>`<img src="${src}" style="width:100%;border-radius:var(--r-lg);display:${i===0?'block':'none'}" class="md-img" data-idx="${i}">`).join('');
  const dots=(p.imagenes||[]).length>1?(p.imagenes||[]).map((_,i)=>`<button style="width:8px;height:8px;border-radius:9999px;border:none;background:${i===0?'var(--primary)':'var(--faint)'}" onclick="showMdImg(${i})"></button>`).join(''):'';
  $('modal-content').innerHTML=`
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div style="position:relative">${imgs}${dots?`<div style="display:flex;gap:.375rem;justify-content:center;margin-top:.5rem">${dots}</div>`:''}</div>
      <div>
        <h2 style="font-size:1.25rem;font-weight:700;margin-bottom:.25rem">${p.nombre}</h2>
        <p style="color:var(--muted);font-size:.9rem">${p.categoria||''} · ${p.talla||''} · ${p.color||''} · ${p.pais_origen||'USA'}</p>
      </div>
      <div style="font-size:1.5rem;font-weight:700;color:var(--primary)">${fmt(p.precio)}</div>
      <p style="font-size:.9rem;line-height:1.5">${p.descripcion||''}</p>
      <div style="display:flex;gap:.5rem">
        <a class="t-btn t-btn-primary" style="flex:1;text-align:center;text-decoration:none" ${p.stock>0?`href="https://wa.me/${whatsapp}?text=${encodeURIComponent('Hola, me interesa: '+p.nombre+' ('+(p.talla||'')+' '+(p.color||'')+') - '+fmt(p.precio))}" target="_blank"`:'style="opacity:.5;pointer-events:none"'}>💬 Pedir por WhatsApp</a>
        <button class="t-btn t-btn-ghost" style="flex:1" onclick="closeModal()">Cerrar</button>
      </div>
    </div>`;
  $('modal').classList.add('open');
}
function closeModal(){$('modal').classList.remove('open')}
function showMdImg(i){document.querySelectorAll('.md-img').forEach((img,idx)=>img.style.display=idx===i?'block':'none')}
init();
</script>
</body>
</html>
