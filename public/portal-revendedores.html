<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#059669">
<title>Portal Revendedores — Tienda Pro</title>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f8f5f2;--surface:#fff;--surface2:#f3f0ec;--border:rgba(0,0,0,.09);--divider:rgba(0,0,0,.06);--text:#1c1917;--muted:#78716c;--faint:#c2bfbb;--primary:#be185d;--primary-h:#9d174d;--revendedor:#059669;--revendedor-h:#047857;--r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-full:9999px;--sh-sm:0 1px 3px rgba(0,0,0,.08);--font:'Satoshi',system-ui,sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;padding-bottom:80px}
input,select,button{font:inherit;color:inherit;border:none;outline:none;background:none}
img{display:block;max-width:100%;height:auto}
.hdr{position:sticky;top:0;z-index:10;background:var(--surface);border-bottom:1px solid var(--divider);padding:.875rem 1rem;display:flex;align-items:center;gap:.75rem;box-shadow:var(--sh-sm)}
.hdr-title{flex:1;font-size:1.125rem;font-weight:700}
.content{padding:1rem;display:flex;flex-direction:column;gap:1rem}
.login-box{max-width:360px;margin:10dvh auto 0;background:var(--surface);border-radius:var(--r-lg);padding:2rem 1.5rem;box-shadow:var(--sh-sm);display:flex;flex-direction:column;gap:1rem}
.login-box h2{text-align:center}
.field{display:flex;flex-direction:column;gap:.375rem}
.field label{font-size:.8rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.field input{background:var(--surface2);border:1.5px solid var(--border);border-radius:var(--r-md);padding:.75rem 1rem;font-size:1rem;width:100%}
.field input:focus{border-color:var(--revendedor)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:.5rem;padding:.75rem 1.25rem;border-radius:var(--r-md);font-weight:600;font-size:.9rem;cursor:pointer}
.btn-rev{background:var(--revendedor);color:#fff}
.btn-rev:hover{background:var(--revendedor-h)}
.btn-ghost{background:var(--surface2);color:var(--text)}
.rev-badge{background:#d1fae5;color:#065f46;padding:.35rem .75rem;border-radius:var(--r-full);font-size:.75rem;font-weight:600}
.prod-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.875rem}
@media(min-width:640px){.prod-grid{grid-template-columns:repeat(3,1fr)}}
.t-card{background:var(--surface);border-radius:var(--r-lg);box-shadow:var(--sh-sm);overflow:hidden;display:flex;flex-direction:column}
.t-img{aspect-ratio:1/1;background:var(--surface2)}
.t-img img{width:100%;height:100%;object-fit:cover}
.t-body{padding:.875rem;display:flex;flex-direction:column;gap:.375rem;flex:1}
.t-name{font-weight:600;font-size:.95rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.t-meta{font-size:.78rem;color:var(--muted)}
.t-price{font-size:1.1rem;font-weight:700;color:var(--primary)}
.t-price-rev{font-size:.9rem;font-weight:700;color:var(--revendedor)}
.t-actions{display:flex;gap:.5rem;margin-top:.5rem}
.t-btn{flex:1;padding:.6rem .5rem;border-radius:var(--r-md);font-weight:600;font-size:.8rem;text-align:center;cursor:pointer}
.t-btn-rev{background:var(--revendedor);color:#fff}
.t-btn-ghost{background:var(--surface2);color:var(--text)}
.empty{text-align:center;padding:3rem 1rem;color:var(--muted)}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:64px;background:var(--surface);border-top:1px solid var(--divider);display:flex;align-items:center;justify-content:space-between;padding:0 1rem;z-index:50}
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;justify-content:center}
.sheet-overlay.open{display:flex}
.sheet{background:var(--surface);border-radius:1.25rem 1.25rem 0 0;width:100%;max-width:480px;max-height:85dvh;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem}
.cart-item{display:flex;align-items:center;gap:.75rem;padding:.625rem 0;border-bottom:1px solid var(--divider)}
.cart-item:last-child{border:none}
.qty-btn{width:28px;height:28px;border-radius:var(--r-full);background:var(--surface2);display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<header class="hdr" id="hdr" style="display:none">
  <span class="hdr-title">👥 Portal Revendedores</span>
  <span class="rev-badge" id="rev-name"></span>
  <button class="btn btn-ghost" style="padding:.5rem .75rem;font-size:.8rem" onclick="logout()">Salir</button>
</header>

<div class="content">
  <!-- Login -->
  <div class="login-box" id="login-box">
    <h2>🔐 Acceso Revendedores</h2>
    <p class="t-muted" style="text-align:center;font-size:.9rem">Ingresa tu key para ver precios especiales</p>
    <div class="field">
      <label>Key de acceso</label>
      <input type="text" id="key-input" placeholder="Ej: REV-AB12" style="text-transform:uppercase">
    </div>
    <button class="btn btn-rev" style="width:100%" onclick="login()">Entrar</button>
    <a href="/tienda-publica.html" style="text-align:center;color:var(--muted);font-size:.85rem;text-decoration:underline">← Volver a la tienda</a>
  </div>

  <!-- Catálogo -->
  <div id="catalogo" style="display:none">
    <div class="prod-grid" id="grid"></div>
  </div>
</div>

<!-- Carrito sheet -->
<div class="sheet-overlay" id="cart-sheet" onclick="if(event.target.id==='cart-sheet')closeCart()">
  <div class="sheet">
    <h3 style="text-align:center">🛒 Tu pedido</h3>
    <div id="cart-items" style="display:flex;flex-direction:column"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding-top:.5rem;border-top:1px solid var(--divider)">
      <span style="font-weight:700">Total</span>
      <span id="cart-total" style="font-weight:700;color:var(--primary);font-size:1.25rem">$0.00</span>
    </div>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-ghost" style="flex:1" onclick="closeCart()">Seguir comprando</button>
      <button class="btn btn-rev" style="flex:1" onclick="sendOrder()">📩 Enviar pedido</button>
    </div>
  </div>
</div>

<div class="bottom-bar" id="bottom-bar" style="display:none">
  <span style="font-weight:600;font-size:.9rem">🛒 <span id="cart-count">0</span> items</span>
  <button class="btn btn-rev" style="padding:.5rem 1rem" onclick="openCart()">Ver pedido</button>
</div>

<script>
const API='';
let rev=null,productos=[],cart=[],whatsapp='';

function $(id){return document.getElementById(id)}
function fmt(n){return '$'+Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}
function revPrice(p){return p.precio*(1-(rev?.descuento||0)/100)}

async function init(){
  const saved=localStorage.getItem('rev-key');
  const w=await fetch(API+'/api/config/whatsapp');
  const wj=await w.json();
  whatsapp=wj.value||'';
  if(saved){await validateKey(saved)}
}
async function validateKey(key){
  const r=await fetch(API+'/api/revendedores');
  const list=await r.json();
  rev=list.find(x=>x.key&&x.key.toUpperCase()===key.toUpperCase());
  if(!rev){alert('Key inválida');localStorage.removeItem('rev-key');return}
  localStorage.setItem('rev-key',rev.key);
  $('login-box').style.display='none';
  $('catalogo').style.display='block';
  $('hdr').style.display='flex';
  $('bottom-bar').style.display='flex';
  $('rev-name').textContent=rev.nombre;
  await loadProducts();
}
async function loadProducts(){
  const r=await fetch(API+'/api/productos?publicado=1');
  productos=await r.json();
  renderCatalogo();
}
function login(){const k=$('key-input').value.trim();if(!k)return;validateKey(k)}
function logout(){rev=null;localStorage.removeItem('rev-key');location.reload()}

function renderCatalogo(){
  const grid=$('grid');
  if(!productos.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1">Sin productos disponibles</div>';return}
  grid.innerHTML=productos.map(p=>{
    const inCart=cart.find(c=>c.id===p.id);
    return `<div class="t-card">
      <div class="t-img">${p.imagenes?.[0]?`<img src="${p.imagenes[0]}" loading="lazy">`:'<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--faint);font-size:2rem">📦</div>'}</div>
      <div class="t-body">
        <div class="t-name">${p.nombre}</div>
        <div class="t-meta">${p.categoria||''} · ${p.talla||''} · ${p.color||''}</div>
        <div style="display:flex;align-items:baseline;gap:.5rem">
          <span class="t-price-rev">${fmt(revPrice(p))}</span>
          <span style="text-decoration:line-through;color:var(--faint);font-size:.8rem">${fmt(p.precio)}</span>
        </div>
        <div class="t-actions">
          ${inCart
            ?`<button class="t-btn t-btn-ghost" onclick="addCart(${p.id},1)">+</button><span style="align-self:center;font-weight:700">${inCart.qty}</span><button class="t-btn t-btn-ghost" onclick="addCart(${p.id},-1)">−</button>`
            :`<button class="t-btn t-btn-rev" onclick="addCart(${p.id},1)">Agregar</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
}
function addCart(id,delta){
  const p=productos.find(x=>x.id===id);if(!p)return;
  const existing=cart.find(c=>c.id===id);
  if(existing){existing.qty+=delta;if(existing.qty<=0)cart=cart.filter(c=>c.id!==id)}
  else if(delta>0)cart.push({id,qty:1,producto:p});
  renderCatalogo();updateCartBar();
}
function updateCartBar(){
  const total=cart.reduce((s,c)=>s+c.qty*revPrice(c.producto),0);
  const count=cart.reduce((s,c)=>s+c.qty,0);
  $('cart-count').textContent=count;
}
function openCart(){
  const list=$('cart-items');
  if(!cart.length){list.innerHTML='<div style="text-align:center;color:var(--muted);padding:1rem">Carrito vacío</div>';$('cart-total').textContent='$0.00';$('cart-sheet').classList.add('open');return}
  let total=0;
  list.innerHTML=cart.map(c=>{
    const price=revPrice(c.producto);
    total+=c.qty*price;
    return `<div class="cart-item">
      <div style="flex:1">
        <div style="font-weight:500;font-size:.9rem">${c.producto.nombre}</div>
        <div class="t-meta">${fmt(price)} c/u</div>
      </div>
      <div style="display:flex;align-items:center;gap:.5rem">
        <span class="qty-btn" onclick="addCart(${c.id},-1);openCart()">−</span>
        <span style="font-weight:700;min-width:20px;text-align:center">${c.qty}</span>
        <span class="qty-btn" onclick="addCart(${c.id},1);openCart()">+</span>
      </div>
      <div style="font-weight:700;min-width:70px;text-align:right">${fmt(c.qty*price)}</div>
    </div>`;
  }).join('');
  $('cart-total').textContent=fmt(total);
  $('cart-sheet').classList.add('open');
}
function closeCart(){$('cart-sheet').classList.remove('open')}
function sendOrder(){
  if(!cart.length)return alert('El carrito está vacío');
  const total=cart.reduce((s,c)=>s+c.qty*revPrice(c.producto),0);
  let text=`Hola, soy *${rev.nombre}* (key: ${rev.key})\nQuiero hacer el siguiente pedido:\n`;
  cart.forEach(c=>{text+=`• ${c.qty}x ${c.producto.nombre} (${c.producto.talla||''} ${c.producto.color||''}) - ${fmt(revPrice(c.producto))} c/u\n`});
  text+=`\n*Total:* ${fmt(total)}`;
  window.open(`https://wa.me/${whatsapp}?text=${encodeURIComponent(text)}`,'_blank');
}
init();
</script>
</body>
</html>
